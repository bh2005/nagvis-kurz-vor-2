name: Docker – Build & Push

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image-Tag (z.B. v2.0.0 oder latest)"
        required: false
        default: "latest"

# Manuell ausführen: Actions → Docker – Build & Push → Run workflow
# Voraussetzung: Secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN in Repository-Settings

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    name: Build & Push zu Docker Hub
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags automatisch ableiten:
      #   push auf main  → bh2005/nagvis2:latest + bh2005/nagvis2:main
      #   push Tag v1.2.3 → bh2005/nagvis2:1.2.3 + bh2005/nagvis2:1.2 + bh2005/nagvis2:latest
      - name: Docker-Metadaten (Tags + Labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: bh2005/nagvis2
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NagVis 2
            org.opencontainers.image.description=Moderne Nagios/Checkmk/Icinga-Visualisierung
            org.opencontainers.image.vendor=bh2005
            org.opencontainers.image.licenses=MIT

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: nagvis2/backend
          file: nagvis2/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit-Cache via GitHub Actions Cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Plattformen: amd64 für Server, arm64 für Raspberry Pi / Apple M-Chips
          platforms: linux/amd64,linux/arm64

      - name: Image-Digest ausgeben
        run: echo "Digest ${{ steps.build-push.outputs.digest }}"
