name: Docs – MkDocs → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "beta/nagvis2/docs/**"
      - "beta/nagvis2/mkdocs.yml"
      - ".github/workflows/docs.yml"
  # Manueller Trigger (z.B. nach Logo-Update ohne Datei-Änderung)
  workflow_dispatch:

# Nur eine Docs-Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy zu GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write   # gh-pages Branch beschreiben

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Vollständige Git-History für mkdocs-git-dates Plugin (falls später hinzugefügt)
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: beta/nagvis2/backend/requirements.txt

      - name: MkDocs + Material installieren
        run: pip install mkdocs>=1.5.0 mkdocs-material>=9.0.0

      - name: MkDocs bauen & auf gh-pages deployen
        working-directory: beta/nagvis2
        run: mkdocs gh-deploy --force --clean --verbose
