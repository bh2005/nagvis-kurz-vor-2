# DEAKTIVIERT – Docs-Build ist jetzt in static.yml integriert.
# Dieser Workflow pushed via mkdocs gh-deploy in den gh-pages-Branch,
# was mit der GitHub-Actions-Deployment-Methode in static.yml kollidiert.
name: Docs – MkDocs → GitHub Pages (DEAKTIVIERT)

on:
  workflow_dispatch:
    inputs:
      disabled:
        description: "Dieser Workflow ist deaktiviert. Docs werden via static.yml gebaut."
        required: false

# Nur eine Docs-Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy zu GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write   # gh-pages Branch beschreiben

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Vollständige Git-History für mkdocs-git-dates Plugin (falls später hinzugefügt)
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: nagvis2/backend/requirements.txt

      - name: MkDocs + Material installieren
        run: pip install mkdocs>=1.5.0 mkdocs-material>=9.0.0

      - name: MkDocs bauen & auf gh-pages deployen
        working-directory: nagvis2
        run: mkdocs gh-deploy --force --clean --verbose
