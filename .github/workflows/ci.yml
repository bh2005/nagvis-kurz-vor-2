name: CI – Tests & Coverage

on:
  push:
    branches: [main]
    paths:
      - "beta/nagvis2/backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "beta/nagvis2/backend/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: beta/nagvis2/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: beta/nagvis2/backend/requirements-dev.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements-dev.txt

      - name: Tests + Coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Coverage-Report hochladen
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: beta/nagvis2/backend/coverage.xml
          retention-days: 14

      - name: Coverage-Kommentar auf PR posten
        if: github.event_name == 'pull_request' && matrix.python-version == '3.13'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_FILE: beta/nagvis2/backend/coverage.xml
