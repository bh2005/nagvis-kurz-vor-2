name: CI – Tests & Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "nagvis2/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "nagvis2/**"
      - ".github/workflows/ci.yml"

jobs:

  # ── Backend: pytest ───────────────────────────────────────────────────────
  backend:
    name: Backend (pytest – Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: nagvis2/backend

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: nagvis2/backend/requirements-dev.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements-dev.txt

      - name: Tests + Coverage (≥ 70 %)
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Coverage-Artefakt hochladen (nur 3.13)
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: nagvis2/backend/coverage.xml
          retention-days: 14

  # ── Frontend: Vitest ──────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: npm-Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('nagvis2/package-lock.json') }}
          restore-keys: npm-

      - name: Abhängigkeiten installieren
        run: cd nagvis2 && npm ci

      - name: Frontend-Tests (Vitest + Coverage)
        run: cd nagvis2 && npm run test:unit:cov

      - name: Coverage-Artefakt hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: nagvis2/coverage/
          retention-days: 14

