services:
  - type: web
    name: nagvis2
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: WS_POLL_INTERVAL
        value: "10"
      - key: PYTHON_VERSION
        value: "3.12.0"