# =============================================================================
# nginx.conf – NagVis 2 (Standalone / Development – WSL-freundlich)
# =============================================================================
# root wird jetzt dynamisch mit $(pwd)/frontend gesetzt

worker_processes  1;
worker_rlimit_nofile  10000;

pid        /tmp/nginx.pid;

error_log  stderr warn;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       mime.types; 
    # WICHTIG: Nur EINMAL definieren:
    default_type  application/octet-stream;
    
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /dev/stdout main;

    # WSL / OneDrive Optimierungen:
    sendfile        off;   # Geändert von on auf off
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary       on;

    client_body_temp_path   /tmp/nginx-client-body  1 2;
    proxy_temp_path         /tmp/nginx-proxy        1 2;
    fastcgi_temp_path       /tmp/nginx-fastcgi      1 2;
    uwsgi_temp_path         /tmp/nginx-uwsgi        1 2;
    scgi_temp_path          /tmp/nginx-scgi         1 2;

    server {
        listen       8080 default_server;
        server_name  _ localhost 127.0.0.1;

        # ────────────────────────────────────────────────
        # Dynamischer root-Pfad – sollte in WSL + OneDrive am besten funktionieren
        # ────────────────────────────────────────────────
        # root "$(pwd)/frontend";
        root "/mnt/c/Users/ks84597/OneDrive - K+S Aktiengesellschaft/Documents/Git-Repos/nagvis-kurz-vor-2/nagvis2/frontend";

        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8008/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        location /ws/ {
            proxy_pass http://127.0.0.1:8008/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        location /health {
            proxy_pass http://127.0.0.1:8008/health;
            proxy_set_header Host $host;
        }

        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

        server_tokens off;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
    }
}