[tool.pytest.ini_options]
testpaths        = ["tests"]
pythonpath       = ["."]
asyncio_mode     = "auto"
filterwarnings   = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source  = ["."]
omit    = [
    "venv/*",
    "tests/*",
    "*/site-packages/*",
    # Netzwerk-Clients (erfordern echte Infrastruktur, kein Unit-Test sinnvoll)
    "checkmk/*",
    "connectors/registry.py",
    "core/livestatus.py",
    "livestatus/*",
    "ws/router.py",
    # Migration & Legacy-Import
    "core/cfg_migration.py",
    "core/migrate.py",
    # Module noch ohne Tests
    "core/map_exporter.py",
    "core/map_store.py",
    "core/poller.py",
    "core/ws_manager.py",
    "help_router.py",
]

[tool.coverage.report]
fail_under      = 70
show_missing    = true
skip_covered    = false
exclude_lines   = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
