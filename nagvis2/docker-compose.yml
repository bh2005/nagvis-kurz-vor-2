services:

  nagvis2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nagvis2
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      # Frontend-Dateien (index.html, css/, js/, src/)
      - ./frontend:/app/frontend:ro
      # Changelog (liegt auf nagvis2/-Ebene, BASE_DIR.parent = /app)
      - ./changelog.txt:/app/changelog.txt:ro
      - ./changelog.md:/app/changelog.md:ro
      # Persistente Daten (Maps, Hintergründe, Kiosk-User)
      # Pfad muss mit WORKDIR /app/backend übereinstimmen (BASE_DIR/data)
      - nagvis2-data:/app/backend/data
      # Livestatus Unix-Socket vom monitoring-Container
      - cmk-tmp:/livestatus:ro
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DEMO_MODE: "false"
      # Livestatus – Unix-Socket direkt (zuverlässiger als TCP via liveproxyd)
      LIVESTATUS_TYPE: unix
      LIVESTATUS_HOST: host.docker.internal
      LIVESTATUS_PORT: "6557"
      LIVESTATUS_PATH: /livestatus/run/live
      LIVESTATUS_SITE: ""
      # WebSocket-Polling
      WS_POLL_INTERVAL: "10"
      # CORS (komma-getrennt)
      CORS_ORIGINS: "http://localhost:8008,https://monitoring.example.com"
    # Zugriff auf Livestatus-Socket auf dem Host:
    # volumes:
    #   - /omd/sites/mysite/tmp/run/live:/var/run/nagios/live:ro
    networks:
      - nagvis2-net

volumes:
  nagvis2-data:
  cmk-tmp:
    external: true

networks:
  nagvis2-net:
    driver: bridge