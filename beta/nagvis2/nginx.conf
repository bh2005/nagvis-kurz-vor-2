# =============================================================================
# nginx.conf – NagVis 2 (Production Ready)
# =============================================================================

server {
    listen 80;
    server_name _;                    # alle Hostnamen akzeptieren

    # =============================================
    # Statisches Frontend
    # =============================================
    root /usr/share/nginx/html;
    index index.html;

    # Alle normalen Requests → SPA (React/Vue/Vanilla)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # API-Proxy zum Backend
    # =============================================
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout für lange Requests (z. B. große Maps)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =============================================
    # WebSocket-Proxy (Livestatus Echtzeit)
    # =============================================
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Wichtig für stabile WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # =============================================
    # Health-Check (wird vom Docker-Healthcheck genutzt)
    # =============================================
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # =============================================
    # Security & Performance
    # =============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Keine Server-Tokens
    server_tokens off;

    # Gzip + Brotli Kompression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
    gzip_vary on;

    # Cache für statische Assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Error-Logging
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}