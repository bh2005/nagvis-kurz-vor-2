services:

  nagvis2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nagvis2
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Frontend-Dateien (index.html, css/, js/, src/)
      - ./frontend:/app/frontend:ro
      # Persistente Daten (Maps, Hintergründe, Kiosk-User)
      # Pfad muss mit WORKDIR /app/backend übereinstimmen (BASE_DIR/data)
      - nagvis2-data:/app/backend/data
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DEMO_MODE: "false"
      # Livestatus – eine der folgenden Optionen:
      LIVESTATUS_TYPE: auto        # auto | tcp | unix | disabled
      LIVESTATUS_HOST: localhost   # für tcp
      LIVESTATUS_PORT: "6557"      # für tcp
      LIVESTATUS_PATH: /var/run/nagios/live  # für unix
      LIVESTATUS_SITE: ""          # OMD-Site-Name (leer = alle probieren)
      # WebSocket-Polling
      WS_POLL_INTERVAL: "10"
      # CORS (komma-getrennt)
      CORS_ORIGINS: "http://localhost:8000,https://monitoring.example.com"
    # Zugriff auf Livestatus-Socket auf dem Host:
    # volumes:
    #   - /omd/sites/mysite/tmp/run/live:/var/run/nagios/live:ro
    networks:
      - nagvis2-net

volumes:
  nagvis2-data:

networks:
  nagvis2-net:
    driver: bridge