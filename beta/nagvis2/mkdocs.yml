site_name: NagVis 2 Help
site_description: NagVis 2 Bedienungsanleitung & Referenz
site_author: NagVis 2 Team
site_url: https://bh2005.github.io/nagvis-kurz-vor-2/

docs_dir: docs
# Lokaler Build (mkdocs build) → frontend/help/   (von FastAPI ausgeliefert)
# GitHub Pages (mkdocs gh-deploy) → gh-pages Branch (automatisch)
site_dir: frontend/help

theme:
  name: material
  logo: assets/images/nagvis2-logo.svg
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - search.highlight
    - search.suggest

extra_css:
  - assets/css/nagvis2-tokens.css

nav:
  - Home: index.md
  - Benutzer: user-guide.md
  - Admin: admin-guide.md
  - API: api-reference.md
  - Kiosk: kiosk-guide.md
  - Hilfe:
      - Canvas: help/canvas-modes.md
      - Verbindungen: help/connections.md
      - Dashboard: help/dashboard.md
      - Migration: help/migrate.md
      - ZIP Import: help/zip-import.md
      - OSM / Weltkarte: osm-guide.md
      - ToDo: todo-liste.md