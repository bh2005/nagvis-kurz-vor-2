[tool.pytest.ini_options]
testpaths        = ["tests"]
pythonpath       = ["."]
asyncio_mode     = "auto"
filterwarnings   = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source  = ["."]
omit    = [
    "venv/*",
    "tests/*",
    "*/site-packages/*",
]

[tool.coverage.report]
show_missing    = true
skip_covered    = false
exclude_lines   = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
